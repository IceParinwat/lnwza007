name: Deploy to Express Server

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          set -e
          mkdir -p .github/tmp
          KEY_B64="${{ secrets.SSH_PRIVATE_KEY_B64 }}"
          KEY_RAW="${{ secrets.SSH_PRIVATE_KEY }}"

          if [ -z "$KEY_B64" ] && [ -z "$KEY_RAW" ]; then
            echo "Both SSH_PRIVATE_KEY_B64 and SSH_PRIVATE_KEY are empty"
            exit 1
          fi

          # Try base64 secret first (preferred)
          if [ -n "$KEY_B64" ]; then
            CLEAN_B64="$(printf '%s' "$KEY_B64" | tr -d '\r\n\t ')"
            if printf '%s' "$CLEAN_B64" | base64 -d > .github/tmp/deploy_key 2>/dev/null; then
              :
            else
              echo "SSH_PRIVATE_KEY_B64 is set but not valid base64"
              exit 1
            fi
          else
            # Legacy fallback: raw multiline or raw with literal \n
            if printf '%s' "$KEY_RAW" | grep -q '\\n'; then
              printf '%b' "$KEY_RAW" > .github/tmp/deploy_key
            else
              printf '%s' "$KEY_RAW" > .github/tmp/deploy_key
            fi
          fi

          tr -d '\r' < .github/tmp/deploy_key > .github/tmp/deploy_key.clean
          mv .github/tmp/deploy_key.clean .github/tmp/deploy_key
          chmod 600 .github/tmp/deploy_key
          if ! head -n 1 .github/tmp/deploy_key | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "Key header invalid"
            exit 1
          fi
          if ! tail -n 1 .github/tmp/deploy_key | grep -q "END OPENSSH PRIVATE KEY"; then
            echo "Key footer invalid"
            exit 1
          fi
          if ! ssh-keygen -l -f .github/tmp/deploy_key >/dev/null 2>&1; then
            echo ".github/tmp/deploy_key is not a valid private key"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: /github/workspace/.github/tmp/deploy_key
          script_stop: true
          script: |
            set -e
            cd /var/www/parinwat.csbootstrap.com/lnwza007
            git pull --ff-only origin main
            npm ci --omit=dev
            pm2 restart parinwat-lnwza007 --update-env || pm2 start index.js --name parinwat-lnwza007
            pm2 save
            curl -fsS https://parinwat.csbootstrap.com/api >/dev/null
            curl -fsS https://parinwat.csbootstrap.com/swagger >/dev/null
# end
